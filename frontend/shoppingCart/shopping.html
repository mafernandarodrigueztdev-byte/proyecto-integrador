<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Entre Libros - Carrito</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/src/pages/shoppingCart/shopping.css">
</head>

<body>
    <div class="container-fluid">

    <div id="navbar-root"></div>


    <main>

            <!--? Carrito-->
            <h1 class="cart-title">Carrito de Compras</h1>
            <br>
            <div class="container-cart">

                <!-- Columna Izquierda: Productos del usuario -->
                <div class="cart-products">
                    <h2>Mi carrito</h2>
                    <ul id="lista-carrito">
                        <li class="carrito-vacio" id="mensaje-vacio">Carrito vacío</li>
                    </ul>
                    <a href="/catalog/catalog.html" class="cartbtn">Encontrar más libros</a>
                </div>

                <!--Resumen columna derecha-->

                <aside class="resumen-container">
                    <h2>Resumen de tu pedido</h2>
                    <div class="resumen-fila">
                        <span>Productos</span>
                        <span id="resumen-productos">0</span>
                    </div>
                    <div class="resumen-fila">
                        <span>Subtotal</span>
                        <span id="resumen-subtotal">$0.00</span>
                    </div>
                    <div class="resumen-total">
                        <span>Total</span>
                        <span id="resumen-total">$0.00</span>
                    </div>
                    <button class="resumenbtn">Realizar pedido</button>
                </aside>
            </div>

        </main>
        <div id="footer-root"></div>
    </div>

    <!-------Carrito Modal------>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCarrito" aria-labelledby="offcanvasCarritoLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="offcanvasCarritoLabel">Tu Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <div class="carrito-productos-lista">
                <p class="text-muted text-center my-5">Tu carrito está vacío actualmente.</p>
            </div>

            <div class="carrito-offcanvas-footer border-top pt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                    <span>Total:</span>
                    <span id="total-offcanvas">$0.00</span>
                </div>

                <a href="/shoppingCart/shopping.html" class="btn w-100 py-2 fw-bold">
                    Ver Carrito Completo
                </a>
            </div>
        </div>
    </div>

     <div id="toast-carrito" class="toast-notificacion">
    <span class="toast-icono">✔️</span>
    <span class="toast-mensaje">¡Libro agregado al carrito!</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/components/layout.js"></script>

    <script type="module" src="/src/pages/shoppingCart/shopping.js"></script>
    <script src="/src/carrito.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/auth.js"></script>
</body>

</html>

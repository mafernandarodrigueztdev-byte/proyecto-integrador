<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo Entre Libros - Catálogo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/src/pages/catalog/catalog.css" />
    <link rel="stylesheet" href="/src/pages/shoppingCart/shopping.css" />
</head>
<body>
    <div class="container-fluid">

     <div id="navbar-root"></div>
 

        <!--? Catálogo -->
        <main class="container py-4">
            <div id="contenedor-categorias">
                <!-- Aquí se renderizan sagas y categorías desde catalog.js -->
            </div>
        </main>

        <!-- MODAL LIBRO -->
        <div class="modal fade" id="modalLibro" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title" id="tituloModal"></h2>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>

                    <div class="modal-body">
                        <div class="row align-items-center g-5 contenedor-info-libro">
                            <div class="col-md-4 text-center portada-container">
                                <img id="imagenModal" class="img-fluid rounded" alt="" />
                            </div>

                            <div class="col-md-8">
                                <div class="datos-grid">
                                    <div class="dato-card">
                                        <span class="dato-label">Autor</span>
                                        <span class="dato-valor" id="autorModal"></span>
                                    </div>

                                    <div class="dato-card">
                                        <span class="dato-label">Saga / colección</span>
                                        <span class="dato-valor" id="cantidadModal"></span>
                                    </div>

                                    <div class="dato-card">
                                        <span class="dato-label">Editorial</span>
                                        <span class="dato-valor" id="editorialModal"></span>
                                    </div>

                                    <div class="dato-card">
                                        <span class="dato-label">Edición</span>
                                        <span class="dato-valor" id="edicionModal"></span>
                                    </div>

                                    <div class="dato-card">
                                        <span class="dato-label">ISBN</span>
                                        <span class="dato-valor" id="isbnModal"></span>
                                    </div>

                                    <div class="dato-card precio-card">
                                        <span class="precio-texto">Precio</span>

                                        <div class="precio-modal">
                                            $<span id="precioModal"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <hr />

                        <h4 class="titulo-sinopsis">Sinopsis</h4>
                        <p id="sinopsisModal"></p>
                    </div>

                    <div class="modal-footer">

                        <button class="btn-wishlist" id="btnWishlist" title="Agregar a wishlist">
                            ♥
                        </button>

                        <button class="btn btn-carrito" id="btnCarrito">
                            Agregar al carrito
                        </button>

                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                            Cerrar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MODAL SAGAS -->
        <div class="modal fade" id="modalSagas" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title" id="tituloModals"></h2>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                    </div>

                    <div class="modal-body">
                        <div class="row align-items-center g-4">
                            <div class="col-md-4 text-center">
                                <img id="imagenModals" class="img-fluid rounded" alt="" />
                            </div>

                            <div class="col-md-8">
                                <p id="descripcionModals"></p>

                                <div class="datos-grid">
                                    <div class="dato-card">
                                        <span class="dato-label">Nombre de la saga</span>
                                        <span class="dato-valor" id="nombreSagaModal"></span>
                                    </div>

                                    <div class="dato-card">
                                        <span class="dato-label">ISBN</span>
                                        <span class="dato-valor" id="isbnModals"></span>
                                    </div>

                                    <div class="dato-card precio-card">
                                        <span class="precio-texto">Precio</span>

                                        <div class="precio-modal">
                                            $<span id="precioModals"></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <hr />

                        <h4 class="titulo-sinopsis">Libros de la saga</h4>

                        <div id="carruselSaga" class="carrusel-libros">
                            <!-- Aquí se insertan las cards de libros de la saga -->
                        </div>
                    </div>

                    <div class="modal-footer">

                        <button class="btn-wishlist" id="btnWishlistSaga" title="Agregar saga a wishlist">
                            ♥
                        </button>

                        <button class="btn btn-carrito-saga" id="btnAgregarSagaCarrito">
                            Agregar saga al carrito
                        </button>

                        <button class="btn btn-secondary" data-bs-dismiss="modal">
                            Cerrar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-root"></div>
    </div>

    <!-- Carrito offcanvas -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasCarrito" aria-labelledby="offcanvasCarritoLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold" id="offcanvasCarritoLabel">
                Tu Carrito
            </h5>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>

        <div class="offcanvas-body d-flex flex-column justify-content-between">
            <div class="carrito-productos-lista">
                <p class="text-muted text-center my-5">
                    Tu carrito está vacío actualmente.
                </p>
            </div>

            <div class="carrito-offcanvas-footer border-top pt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                    <span>Total:</span>
                    <span id="total-offcanvas">$0.00</span>
                </div>

                <a href="/shoppingCart/shopping.html" class="btn w-100 py-2 fw-bold">
                    Ver Carrito Completo
                </a>
            </div>
        </div>
    </div>

    <div id="toast-carrito" class="toast-notificacion">
        <span class="toast-icono">✔️</span>
        <span class="toast-mensaje">¡Libro agregado al carrito!</span>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="/src/components/layout.js"></script>
    <script type="module" src="/src/pages/catalog/catalog.js"></script>
    <script src="/src/carrito.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/auth.js"></script>
</body>

</html>
